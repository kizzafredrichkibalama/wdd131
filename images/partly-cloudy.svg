  <line x1="14" y1="38" x2="8" y2="38" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="38" x2="68" y2="38" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="21" x2="17" y2="17" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="55" x2="59" y2="59" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
