<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A responsive temple album showcasing beautiful Latter-day Saint temples from around the world, with interactive filtering.">
  <meta name="author" content="Kizza Fredrich Kibalama">
  <title>Temple Album – WDD 131</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/filtered-temples.css">
  <script src="scripts/filtered-temples.js" defer></script>
</head>
<body>

  <header>
    <!-- Use <p> not <h2> to keep heading order: h1 belongs in <main> -->
    <p class="site-title">Temple Album</p>
    <button id="hamburger" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
    <nav id="main-nav" aria-label="Temple filter">
      <a href="#" data-filter="home" class="active" aria-current="page">Home</a>
      <a href="#" data-filter="old">Old</a>
      <a href="#" data-filter="new">New</a>
      <a href="#" data-filter="large">Large</a>
      <a href="#" data-filter="small">Small</a>
    </nav>
  </header>

  <main>
    <h1 id="page-heading">Home</h1>
    <div class="gallery" id="gallery" aria-live="polite" aria-label="Temple gallery"></div>
  </main>

  <footer>
    <p>&copy;<span id="year"></span> &mdash; Kizza Fredrich Kibalama &mdash; All Rights Reserved</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>

</body>
</html>
